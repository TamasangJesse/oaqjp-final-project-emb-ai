<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 10px; padding: 10px 24px; background: #0062ff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0043ce; }
        #result { margin-top: 20px; padding: 16px; background: white; border-radius: 4px; border: 1px solid #ddd; font-size: 16px; min-height: 50px; }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter customer feedback below to detect the dominant emotion:</p>
    <textarea id="textToAnalyse" placeholder="Type your text here..."></textarea>
    <br>
    <button onclick="RunSentimentAnalysis()">Analyse Emotion</button>
    <div id="result">Results will appear here...</div>

    <script>
        function RunSentimentAnalysis() {
            const text = document.getElementById("textToAnalyse").value;
            const xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("result").innerHTML = this.responseText;
                }
            };
            xhttp.open("GET", "emotionDetector?textToAnalyse=" + encodeURIComponent(text), true);
            xhttp.send();
        }
    </script>
</body>
</html>
